<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Funds Wallet</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1220;
    color: white;
  }

  header {
    padding: 18px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    background: #111a2e;
  }

  .container {
    padding: 15px;
  }

  .card {
    background: #121c33;
    padding: 15px;
    border-radius: 14px;
    margin-bottom: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  }

  .balance {
    font-size: 30px;
    color: #22c55e;
    font-weight: bold;
  }

  .row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
  }

  button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #2563eb;
    color: white;
    font-size: 14px;
  }

  button:hover {
    background: #1d4ed8;
  }

  .tx {
    padding: 10px;
    border-radius: 10px;
    background: #0f1a30;
    margin-top: 8px;
    font-size: 14px;
  }

  .green { color: #22c55e; }
  .red { color: #ef4444; }

  nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #111a2e;
    display: flex;
    justify-content: space-around;
    padding: 10px;
  }

  nav div {
    font-size: 12px;
    text-align: center;
    color: #94a3b8;
  }
</style>
</head>

<body>

<header>💰 Funds Wallet</header>

<div class="container">

  <div class="card">
    <p>Available Balance</p>
    <div class="balance">π 0.00</div>
    <small>Testnet Account</small>
  </div>

  <div class="card">
    <h3>Quick Actions</h3>
    <div class="row">
      <button onclick="login()">Login</button>
      <button onclick="pay()">Send</button>
    </div>
  </div>

  <div class="card">
    <h3>Recent Transactions</h3>

    <div class="tx">
      ➜ Received <span class="green">+0.01 π</span>
    </div>

    <div class="tx">
      ➜ Sent <span class="red">-0.02 π</span>
    </div>

    <div class="tx">
      ➜ Pending <span>0.00 π</span>
    </div>
  </div>

</div>

<nav>
  <div>🏠 Home</div>
  <div>💳 Wallet</div>
  <div>📊 History</div>
  <div>⚙️ Settings</div>
</nav>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<script>
Pi.init({ version: "2.0" });

async function login() {
  try {
    const user = await Pi.authenticate(['payments']);
    alert("Logged in!");
    console.log(user);
  } catch (e) {
    alert("Login failed");
  }
}

async function pay() {
  try {
    await Pi.createPayment({
      amount: 0.01,
      memo: "Funds Test Payment",
      metadata: { type: "test" }
    });
    alert("Payment started");
  } catch (e) {
    alert("Payment error");
  }
}
</script>

</body>
</html>
