<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pro Wallet</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

.card {
  background: #111827;
  padding: 30px;
  border-radius: 16px;
  width: 320px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: none;
  border-radius: 8px;
  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}
</style>

</head>

<body>

<div class="card">
  <h2>Pro Wallet DEMO</h2>

  <input type="text" placeholder="Username">
  <input type="password" placeholder="Password">

  <button>Login</button>
</div>

</body>
</html>
