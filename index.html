<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ProWallet 6.0</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0e11;
  color:#eaecef;
}

/* HEADER */
header{
  background:#161a1e;
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #222;
}

/* LAYOUT */
.container{display:flex;}

.sidebar{
  width:220px;
  background:#0b0e11;
  border-right:1px solid #222;
  padding:20px;
}

.sidebar h2{
  color:#f0b90b;
}

.sidebar p{
  padding:10px 0;
  color:#aaa;
  cursor:pointer;
}

.sidebar p:hover{
  color:#fff;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

/* CARDS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}

.card{
  background:#161a1e;
  padding:15px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.3);
}

/* PRICE */
.price{
  font-size:28px;
  font-weight:bold;
  color:#f0b90b;
}

.green{color:#0ecb81;}
.red{color:#f6465d;}

/* INPUTS */
input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  background:#0b0e11;
  color:#fff;
}

/* BUTTONS */
button{
  width:48%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.buy{background:#0ecb81;color:#000;}
.sell{background:#f6465d;color:#fff;}

button:hover{opacity:0.8;}

/* CHART */
canvas{
  width:100%;
  height:200px;
  background:#0b0e11;
  border-radius:10px;
}

/* LOGIN */
#loginPage{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.login-box{
  background:#161a1e;
  padding:30px;
  border-radius:10px;
  width:300px;
}

.login-box h2{
  text-align:center;
  margin-bottom:20px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <h2>⚡ ProWallet</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button style="width:100%" onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<header>
  <div>⚡ ProWallet Exchange</div>
  <div>
    <span id="user"></span>
    <button onclick="logout()">Logout</button>
  </div>
</header>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Market</h2>
  <p>Dashboard</p>
  <p>Trade</p>
  <p>Portfolio</p>
</div>

<!-- MAIN -->
<div class="main">

<div class="grid">

<!-- PRICE -->
<div class="card">
  <div>BTC/USDT</div>
  <div id="price" class="price">$0</div>
</div>

<!-- PORTFOLIO -->
<div class="card">
  <h3>Portfolio</h3>
  USD: $<span id="usd">0</span><br>
  BTC: <span id="btc">0</span><br>
  Total: $<span id="total">0</span>
</div>

<!-- TRADE -->
<div class="card">
  <h3>Trade</h3>
  <input id="amount" placeholder="USD amount">

  <div style="display:flex; justify-content:space-between;">
    <button class="buy" onclick="buy()">BUY</button>
    <button class="sell" onclick="sell()">SELL</button>
  </div>
</div>

<!-- CHART -->
<div class="card">
  <h3>Chart</h3>
  <canvas id="chart"></canvas>
</div>

<!-- HISTORY -->
<div class="card">
  <h3>History</h3>
  <div id="history"></div>
</div>

</div>
</div>

</div>

<script>

let price = 76000;
let chartData = [];
let interval;

// LOAD
window.addEventListener("load", () => {
  if(localStorage.getItem("user")){
    showApp();
  }
});

// LOGIN
function login(){
  let u=document.getElementById("username").value;
  if(!u) return alert("Enter username");

  localStorage.setItem("user",u);

  if(!localStorage.getItem("usd")){
    localStorage.setItem("usd","1000");
    localStorage.setItem("btc","0");
  }

  showApp();
}

// SHOW
function showApp(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("app").style.display="block";

  document.getElementById("user").innerText =
    localStorage.getItem("user");

  clearInterval(interval);
  interval=setInterval(update,2000);

  update();
}

// LOGOUT
function logout(){
  localStorage.removeItem("user");
  clearInterval(interval);

  document.getElementById("app").style.display="none";
  document.getElementById("loginPage").style.display="flex";
}

// MARKET
function update(){
  price += (Math.random()-0.5)*200;
  price = Math.max(1000,price);

  chartData.push(price);
  if(chartData.length>30) chartData.shift();

  document.getElementById("price").innerText =
    "$"+price.toFixed(2);

  portfolio();
  drawChart();
}

// PORTFOLIO
function portfolio(){
  let usd=Number(localStorage.getItem("usd")||0);
  let btc=Number(localStorage.getItem("btc")||0);

  let total = usd + btc*price;

  document.getElementById("usd").innerText=usd.toFixed(2);
  document.getElementById("btc").innerText=btc.toFixed(6);
  document.getElementById("total").innerText=total.toFixed(2);
}

// TRADE
function buy(){
  let amt=Number(document.getElementById("amount").value);
  if(!amt) return;

  let usd=Number(localStorage.getItem("usd")||0);
  let btc=Number(localStorage.getItem("btc")||0);

  if(amt>usd) return alert("Not enough USD");

  usd-=amt;
  btc+=amt/price;

  localStorage.setItem("usd",usd);
  localStorage.setItem("btc",btc);

  addHistory("BUY",amt);
}

function sell(){
  let amt=Number(document.getElementById("amount").value);
  if(!amt) return;

  let usd=Number(localStorage.getItem("usd")||0);
  let btc=Number(localStorage.getItem("btc")||0);

  let b=amt/price;
  if(b>btc) return alert("Not enough BTC");

  btc-=b;
  usd+=amt;

  localStorage.setItem("usd",usd);
  localStorage.setItem("btc",btc);

  addHistory("SELL",amt);
}

// HISTORY
function addHistory(type,amt){
  let h=JSON.parse(localStorage.getItem("h")||"[]");
  h.unshift({type,amt,price:price.toFixed(2)});
  if(h.length>10) h.pop();

  localStorage.setItem("h",JSON.stringify(h));
  renderHistory();
}

function renderHistory(){
  let h=JSON.parse(localStorage.getItem("h")||"[]");
  document.getElementById("history").innerHTML =
    h.map(x=>`<div>${x.type} $${x.amt} @ ${x.price}</div>`).join("");
}

// CHART
function drawChart(){
  let c=document.getElementById("chart");
  let ctx=c.getContext("2d");

  c.width=c.clientWidth;
  c.height=200;

  ctx.clearRect(0,0,c.width,c.height);
  ctx.beginPath();

  let max=Math.max(...chartData);
  let min=Math.min(...chartData);

  chartData.forEach((p,i)=>{
    let x=(i/chartData.length)*c.width;
    let y=c.height-((p-min)/(max-min))*c.height;

    if(i==0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });

  ctx.strokeStyle="#f0b90b";
  ctx.stroke();
}

</script>

</body>
</html>
