<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ProWallet 4.0 Exchange</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0f1c;
  color:#fff;
}

header{
  padding:12px;
  background:#111a2e;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container{display:flex;}

.sidebar{
  width:200px;
  background:#0f1628;
  height:100vh;
  padding:10px;
}

.main{flex:1;padding:15px;}

.card{
  background:#151f38;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
}

input{
  padding:8px;
  width:90%;
  margin:5px 0;
}

button{
  padding:8px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.green{color:#00ff9d;}
.red{color:#ff4d4d;}

table{
  width:100%;
  font-size:12px;
  border-collapse:collapse;
}

td,th{
  padding:5px;
  border-bottom:1px solid #222;
}

canvas{
  background:#0b1220;
  width:100%;
  height:200px;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" style="padding:40px;">
  <h2>ProWallet 4.0 Login</h2>
  <input id="username" placeholder="Username"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<header>
  <div>⚡ ProWallet 4.0 Exchange</div>
  <div>
    User: <span id="user"></span>
    <button onclick="logout()">Logout</button>
  </div>
</header>

<div class="container">

<div class="sidebar">
  <h3>Menu</h3>
  <p>Dashboard</p>
  <p>Trade</p>
  <p>Chart</p>
  <p>History</p>
</div>

<div class="main">

<!-- PRICE -->
<div class="card">
  <h3>Live BTC</h3>
  <div id="price">BTC: $0</div>
  <div id="pl" class="green">P/L: $0</div>
</div>

<!-- CHART -->
<div class="card">
  <h3>Market Chart</h3>
  <canvas id="chart"></canvas>
</div>

<!-- TRADE -->
<div class="card">
  <h3>Trade BTC</h3>
  <input id="amount" placeholder="USD amount">
  <button onclick="buy()">BUY</button>
  <button onclick="sell()">SELL</button>
</div>

<!-- PORTFOLIO -->
<div class="card">
  <h3>Portfolio</h3>
  USD: $<span id="usd">0</span><br>
  BTC: <span id="btc">0</span><br>
  Total: $<span id="total">0</span>
</div>

<!-- ORDER BOOK -->
<div class="card">
  <h3>Order History</h3>
  <table id="history"></table>
</div>

</div>
</div>

<script>

// ================= STATE =================
let price = 76000;
let prices = [];
let interval;
let entryPrice = 76000;

// ================= LOGIN =================
function login(){
  let u=document.getElementById("username").value;
  let p=document.getElementById("password").value;
  if(!u||!p) return alert("Enter details");

  localStorage.setItem("user",u);

  if(!localStorage.getItem("usd")){
    localStorage.setItem("usd","1000");
    localStorage.setItem("btc","0");
  }

  show();
}

// ================= SHOW =================
function show(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("app").style.display="block";

  document.getElementById("user").innerText=
    localStorage.getItem("user");

  clearInterval(interval);
  interval=setInterval(update,2000);

  update();
}

// ================= LOGOUT =================
function logout(){
  localStorage.clear();
  location.reload();
}

// ================= PRICE ENGINE =================
function update(){
  price += (Math.random()-0.5)*300;
  price = Math.max(1000,price);

  prices.push(price);
  if(prices.length>30) prices.shift();

  document.getElementById("price").innerText =
    "BTC: $" + price.toFixed(2);

  drawChart();
  portfolio();
}

// ================= PORTFOLIO =================
function portfolio(){
  let usd=Number(localStorage.getItem("usd")||0);
  let btc=Number(localStorage.getItem("btc")||0);

  let total = usd + btc*price;

  let pl = (price - entryPrice) * btc;

  document.getElementById("usd").innerText=usd.toFixed(2);
  document.getElementById("btc").innerText=btc.toFixed(6);
  document.getElementById("total").innerText=total.toFixed(2);

  let plEl=document.getElementById("pl");
  plEl.innerText="P/L: $"+pl.toFixed(2);
  plEl.className = pl>=0 ? "green":"red";
}

// ================= TRADE =================
function buy(){
  let amt=Number(document.getElementById("amount").value);
  if(!amt) return;

  let usd=Number(localStorage.getItem("usd")||0);
  let btc=Number(localStorage.getItem("btc")||0);

  if(amt>usd) return alert("Not enough USD");

  usd-=amt;
  btc+=amt/price;

  entryPrice=price;

  localStorage.setItem("usd",usd);
  localStorage.setItem("btc",btc);

  addHistory("BUY",amt);
}

// SELL
function sell(){
  let amt=Number(document.getElementById("amount").value);
  if(!amt) return;

  let usd=Number(localStorage.getItem("usd")||0);
  let btc=Number(localStorage.getItem("btc")||0);

  let b=amt/price;
  if(b>btc) return alert("Not enough BTC");

  btc-=b;
  usd+=amt;

  localStorage.setItem("usd",usd);
  localStorage.setItem("btc",btc);

  addHistory("SELL",amt);
}

// ================= HISTORY =================
function addHistory(type,amt){
  let h=JSON.parse(localStorage.getItem("h")||"[]");
  h.unshift({type,amt,price:price.toFixed(2),time:new Date().toLocaleTimeString()});
  if(h.length>10) h.pop();

  localStorage.setItem("h",JSON.stringify(h));
  renderHistory();
}

function renderHistory(){
  let h=JSON.parse(localStorage.getItem("h")||"[]");
  document.getElementById("history").innerHTML=
    "<tr><th>Type</th><th>Amt</th><th>Price</th><th>Time</th></tr>"+
    h.map(x=>
      `<tr>
        <td>${x.type}</td>
        <td>${x.amt}</td>
        <td>${x.price}</td>
        <td>${x.time}</td>
      </tr>`
    ).join("");
}

// ================= CHART =================
function drawChart(){
  let c=document.getElementById("chart");
  let ctx=c.getContext("2d");

  c.width=c.clientWidth;
  c.height=200;

  ctx.clearRect(0,0,c.width,c.height);

  ctx.beginPath();
  ctx.strokeStyle="#00ffcc";

  let max=Math.max(...prices);
  let min=Math.min(...prices);

  prices.forEach((p,i)=>{
    let x=(i/prices.length)*c.width;
    let y=c.height-((p-min)/(max-min))*c.height;

    if(i===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });

  ctx.stroke();
}

</script>

</body>
</html>
