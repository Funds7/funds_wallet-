<!DOCTYPE html>
<html>
<head>
  <title>Pro Wallet</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
    }
    .card {
      background: #1e293b;
      padding: 20px;
      margin: 20px;
      border-radius: 10px;
    }
    button {
      padding: 10px;
      margin: 5px;
      background: #22c55e;
      border: none;
      color: white;
      border-radius: 5px;
    }
    input {
      padding: 10px;
      margin: 5px;
    }
  </style>
</head>

<body>

<h1>💰 Pro Wallet + Trading</h1>

<div class="card">
  <h2>Balance: $<span id="balance">1000</span></h2>
</div>

<div class="card">
  <h3>Trade</h3>
  <input type="number" id="amount" placeholder="Enter amount">
  <br>
  <button onclick="buy()">Buy</button>
  <button onclick="sell()">Sell</button>
</div>

<div class="card">
  <h3>History</h3>
  <ul id="history"></ul>
</div>

<script>
let balance = localStorage.getItem("balance") || 1000;
balance = parseFloat(balance);
document.getElementById("balance").innerText = balance;

function save() {
  localStorage.setItem("balance", balance);
}

function addHistory(text) {
  let li = document.createElement("li");
  li.innerText = text;
  document.getElementById("history").appendChild(li);
}

function buy() {
  let amount = parseFloat(document.getElementById("amount").value);
  if (amount > balance) return alert("Not enough balance");

  balance -= amount;
  document.getElementById("balance").innerText = balance;
  addHistory("BUY: $" + amount);

  save();
}

function sell() {
  let amount = parseFloat(document.getElementById("amount").value);

  balance += amount;
  document.getElementById("balance").innerText = balance;
  addHistory("SELL: $" + amount);

  save();
}
</script>

</body>
</html>
