<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ProWallet 5.0</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0f1c;
  color:#fff;
}

header{
  padding:12px;
  background:#111a2e;
  display:flex;
  justify-content:space-between;
}

.container{display:flex;}
.sidebar{
  width:200px;
  background:#0f1628;
  height:100vh;
  padding:10px;
}

.main{flex:1;padding:15px;}

.card{
  background:#151f38;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
}

input,button{
  padding:8px;
  margin:5px 0;
  border-radius:6px;
  border:none;
}

button{cursor:pointer}

.green{color:#00ff9d}
.red{color:#ff4d4d}

canvas{
  width:100%;
  height:200px;
  background:#0b1220;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" style="padding:40px;">
  <h2>ProWallet 5.0 Login</h2>
  <input id="username" placeholder="Username"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<header>
  <div>⚡ ProWallet 5.0</div>
  <div>
    User: <span id="user"></span>
    <button onclick="logout()">Logout</button>
  </div>
</header>

<div class="container">

<div class="sidebar">
  <p>Dashboard</p>
  <p>Trade</p>
  <p>Chart</p>
</div>

<div class="main">

<div class="card">
  <h3>BTC Price</h3>
  <div id="price">0</div>
</div>

<div class="card">
  <h3>Portfolio</h3>
  USD: $<span id="usd">0</span><br>
  BTC: <span id="btc">0</span><br>
  Total: $<span id="total">0</span>
</div>

<div class="card">
  <h3>Trade</h3>
  <input id="amount" placeholder="USD amount">
  <button onclick="buy()">BUY</button>
  <button onclick="sell()">SELL</button>
</div>

<div class="card">
  <h3>Chart</h3>
  <canvas id="chart"></canvas>
</div>

<div class="card">
  <h3>History</h3>
  <div id="history"></div>
</div>

</div>
</div>

<script>

console.log("PROWALLET 5.0 ACTIVE");

let price = 76000;
let chartData = [];
let interval;

// ================= LOAD =================
window.addEventListener("load", () => {
  if(localStorage.getItem("user")){
    showApp();
  } else {
    document.getElementById("loginPage").style.display="block";
  }
});

// ================= LOGIN =================
function login(){
  let u=document.getElementById("username").value;
  if(!u) return alert("Enter username");

  localStorage.setItem("user",u);

  if(!localStorage.getItem("usd")){
    localStorage.setItem("usd","1000");
    localStorage.setItem("btc","0");
  }

  showApp();
}

// ================= SHOW =================
function showApp(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("app").style.display="block";

  document.getElementById("user").innerText=
    localStorage.getItem("user");

  clearInterval(interval);
  interval=setInterval(update,2000);

  update();
}

// ================= LOGOUT =================
function logout(){
  // clear ONLY session data (not everything needed for stability)
  localStorage.removeItem("user");
  
  // reset intervals safely
  if (interval) clearInterval(interval);

  // force UI reset instead of full reload glitch
  document.getElementById("app").style.display = "none";
  document.getElementById("loginPage").style.display = "block";

  // optional: clear inputs
  document.getElementById("username").value = "";
  document.getElementById("password").value = "";
}

// ================= MARKET =================
function update(){
  price += (Math.random()-0.5)*250;
  price = Math.max(1000,price);

  chartData.push(price);
  if(chartData.length>25) chartData.shift();

  document.getElementById("price").innerText =
    "$"+price.toFixed(2);

  portfolio();
  drawChart();
}

// ================= PORTFOLIO =================
function portfolio(){
  let usd=Number(localStorage.getItem("usd")||0);
  let btc=Number(localStorage.getItem("btc")||0);

  let total = usd + btc*price;

  document.getElementById("usd").innerText=usd.toFixed(2);
  document.getElementById("btc").innerText=btc.toFixed(6);
  document.getElementById("total").innerText=total.toFixed(2);
}

// ================= TRADE =================
function buy(){
  let amt=Number(document.getElementById("amount").value);
  if(!amt) return;

  let usd=Number(localStorage.getItem("usd")||0);
  let btc=Number(localStorage.getItem("btc")||0);

  if(amt>usd) return alert("Not enough USD");

  usd-=amt;
  btc+=amt/price;

  localStorage.setItem("usd",usd);
  localStorage.setItem("btc",btc);

  addHistory("BUY",amt);
}

function sell(){
  let amt=Number(document.getElementById("amount").value);
  if(!amt) return;

  let usd=Number(localStorage.getItem("usd")||0);
  let btc=Number(localStorage.getItem("btc")||0);

  let b=amt/price;
  if(b>btc) return alert("Not enough BTC");

  btc-=b;
  usd+=amt;

  localStorage.setItem("usd",usd);
  localStorage.setItem("btc",btc);

  addHistory("SELL",amt);
}

// ================= HISTORY =================
function addHistory(type,amt){
  let h=JSON.parse(localStorage.getItem("h")||"[]");
  h.unshift({type,amt,price:price.toFixed(2)});
  if(h.length>8) h.pop();

  localStorage.setItem("h",JSON.stringify(h));
  renderHistory();
}

function renderHistory(){
  let h=JSON.parse(localStorage.getItem("h")||"[]");
  document.getElementById("history").innerHTML =
    h.map(x=>`${x.type} $${x.amt} @ ${x.price}`).join("<br>");
}

// ================= CHART =================
function drawChart(){
  let c=document.getElementById("chart");
  let ctx=c.getContext("2d");

  c.width=c.clientWidth;
  c.height=200;

  ctx.clearRect(0,0,c.width,c.height);
  ctx.beginPath();

  let max=Math.max(...chartData);
  let min=Math.min(...chartData);

  chartData.forEach((p,i)=>{
    let x=(i/chartData.length)*c.width;
    let y=c.height-((p-min)/(max-min))*c.height;

    if(i==0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });

  ctx.strokeStyle="#00ffcc";
  ctx.stroke();
}

</script>

</body>
</html>
