<!DOCTYPE html>
<html>
<head>
  <title>ProWallet Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box">

  <h2>Welcome, <span id="username"></span></h2>

  <h3>💰 Balance: $<span id="balance"></span></h3>
  <h3>🪙 BTC Owned: <span id="btc"></span></h3>
 
  <h3>📈 BTC Price: $<span id="price">Loading...</span></h3>
<h3>💼 Total Value: $<span id="totalValue"></span></h3>

  <h3>📊 P/L: $<span id="profit"></span> (<span id="profitPercent"></span>)</h3>
  <h3>📊 Live BTC Chart</h3>
  <div id="chart" style="height:400px;"></div>

  <button onclick="buyBTC()">BUY</button>
  <button onclick="sellBTC()">SELL</button>

  <h3>📜 History</h3>
  <div id="history"></div>

  <button onclick="logout()">Logout</button>

</div>

<!-- ✅ SCRIPTS GO HERE -->

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
new TradingView.widget({
  "width": "100%",
  "height": 400,
  "symbol": "BINANCE:BTCUSDT",
  "interval": "5",
  "timezone": "Etc/UTC",
  "theme": "dark",
  "style": "1",
  "locale": "en",
  "toolbar_bg": "#0b0f1a",
  "enable_publishing": false,
  "hide_top_toolbar": false,
  "save_image": false,
  "container_id": "chart"
});
</script>

<script src="script.js"></script>

</body>
</html>
